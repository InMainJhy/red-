services:
  postgres:
    image: postgres:16-alpine
    container_name: time-persona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: time_persona
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: time-persona-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/time_persona
      PORT: 3030
      TARGET_MODEL: gpt-5.4
      FALLBACK_MODEL: claude-opus-4-6
      IMPORT_ON_BOOT: "false"
      NODE_ENV: production
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: time-persona-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
